[plugin]

name="GDApp_Plugin"
description="A top-layer Plugin for Godot projects that use the gd_app GDScript library.

The project must contain the /gd_app/ library inside of its res://lib/ directory, in order for the plugin to function properly.

The gd_app library:
https://github.com/gammasynth/gd_app

The gd_app_plugin Plugin:
https://github.com/gammasynth/gd_app_plugin"
author="Gammasynth"
version="0.3.3"
script="gd_app_plugin.gd"
